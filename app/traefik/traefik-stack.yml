# Traefik Gateway for Docker Swarm

networks:
  web:
    external: true

services:
  traefik:
    image: traefik:v2.11
    command:
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false

      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --accesslog=true
      - --log.level=INFO
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 8080
        published: 8080
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
