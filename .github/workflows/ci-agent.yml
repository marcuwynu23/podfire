name: CI - Agent (TypeScript)

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/ci-agent.yml"
  pull_request:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/ci-agent.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: agent/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
