name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: App (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test

  agent:
    name: Agent (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: agent/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  agent-go:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: agent-go/go.sum
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test -count=1 ./...
